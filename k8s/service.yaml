apiVersion: v1
kind: Service
metadata:
  name: webapp
  labels: { app: webapp }
spec:
  type: NodePort
  selector:
    app: webapp
    env: prod
    track: stable
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: webapp-canary
  labels: { app: webapp, track: canary }
spec:
  type: NodePort
  selector:
    app: webapp
    env: prod
    track: canary
  ports:
    - name: http
      port: 80
      targetPort: 8080
