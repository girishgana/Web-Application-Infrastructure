apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-staging
  labels: { app: webapp, env: staging }
spec:
  replicas: 2
  selector: { matchLabels: { app: webapp, env: staging } }
  template:
    metadata:
      labels: { app: webapp, env: staging }
    spec:
      containers:
        - name: web
          image: <ECR_REPO_URL>:staging
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8080 }]
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-conn
                  key: host
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-conn
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-conn
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-conn
                  key: dbname
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Secret
metadata:
  name: db-conn
type: Opaque
stringData:
  host: "<RDS_ENDPOINT_DNS>"
  username: "appuser"
  password: "<POPULATED_FROM_SECRETS_MANAGER>"
  dbname: "appdb"
