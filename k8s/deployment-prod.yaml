apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-prod
  labels: { app: webapp, env: prod, track: stable }
spec:
  replicas: 3
  selector: { matchLabels: { app: webapp, env: prod, track: stable } }
  template:
    metadata:
      labels: { app: webapp, env: prod, track: stable }
    spec:
      containers:
        - name: web
          image: <ECR_REPO_URL>:prod
          ports: [{ containerPort: 8080 }]
          envFrom:
            - secretRef: { name: db-conn-prod }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-prod-canary
  labels: { app: webapp, env: prod, track: canary }
spec:
  replicas: 1
  selector: { matchLabels: { app: webapp, env: prod, track: canary } }
  template:
    metadata:
      labels: { app: webapp, env: prod, track: canary }
    spec:
      containers:
        - name: web
          image: <ECR_REPO_URL>:prod-canary
          ports: [{ containerPort: 8080 }]
          envFrom:
            - secretRef: { name: db-conn-prod }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Secret
metadata:
  name: db-conn-prod
type: Opaque
stringData:
  host: "<RDS_ENDPOINT_DNS>"
  username: "appuser"
  password: "<POPULATED_FROM_SECRETS_MANAGER>"
  dbname: "appdb"
