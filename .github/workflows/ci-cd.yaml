# .github/workflows/ci-cd.yaml
name: CI/CD - build & deploy

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: scalable-webapp
  EKS_CLUSTER_NAME: scalable-webapp-cluster
  K8S_NAMESPACE: webapp

jobs:
  build_and_scan:
    name: Build, scan, push
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.push-image.outputs.image }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build and push Docker image
      id: push-image
      uses: docker/build-push-action@v4
      with:
        context: ./app
        push: true
        tags: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest
        cache-from: type=registry,ref=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest

    - name: Set output image URI
      run: echo "::set-output name=image::${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest"

    - name: Run Trivy security scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest

  deploy_staging:
    name: Deploy to staging and test
    runs-on: ubuntu-latest
    needs: build_and_scan
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

    - name: Ensure namespace exists
      run: kubectl apply -f k8s/namespace.yaml

    - name: Create/Update secret for DB (staging)
      env:
        DB_HOST: ${{ secrets.STAGING_DB_HOST }}
        DB_USER: ${{ secrets.STAGING_DB_USER }}
        DB_PASS: ${{ secrets.STAGING_DB_PASS }}
      run: |
        kubectl -n ${K8S_NAMESPACE} delete secret db-credentials --ignore-not-found
        kubectl -n ${K8S_NAMESPACE} create secret generic db-credentials \
          --from-literal=host="$DB_HOST" \
          --from-literal=username="$DB_USER" \
          --from-literal=password="$DB_PASS"

    - name: Deploy k8s manifests (service + ingress)
      run: |
        # Replace image in deployment manifest and apply
        IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest
        sed -e "s|REPLACE_WITH_ECR_URI|$IMAGE|g" k8s/deployment.yaml | kubectl -n ${K8S_NAMESPACE} apply -f -
        kubectl -n ${K8S_NAMESPACE} apply -f k8s/service.yaml
        kubectl -n ${K8S_NAMESPACE} apply -f k8s/ingress.yaml

    - name: Wait for pods ready
      run: |
        kubectl -n ${K8S_NAMESPACE} rollout status deployment/webapp --timeout=180s

    - name: Run integration tests against staging
      run: |
        # The STAGING_ALB_URL secret should contain e.g. "http://my-staging-alb-123.ap-south-1.elb.amazonaws.com"
        ./scripts/run_integration_tests.sh "${{ secrets.STAGING_ALB_URL }}"

  approve_and_deploy_prod:
    name: Approve & Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy_staging
    environment:
      name: production   # Protect this environment in GitHub settings to require manual approval
      url: ${{ secrets.PROD_ALB_URL }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

    - name: Deploy to production (update image)
      run: |
        IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest
        sed -e "s|REPLACE_WITH_ECR_URI|$IMAGE|g" k8s/deployment.yaml | kubectl -n ${K8S_NAMESPACE} apply -f -
        kubectl -n ${K8S_NAMESPACE} rollout status deployment/webapp --timeout=180s
