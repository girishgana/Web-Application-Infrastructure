name: CI-CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REPO_NAME: scalable-app-app
  EKS_CLUSTER: scalable-app-eks
  STAGING_TAG: staging
  PROD_TAG: prod

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        working-directory: app
        run: |
          docker build -t ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO_NAME }}:${{ github.sha }} .
          docker tag ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO_NAME }}:${{ github.sha }} \
                     ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO_NAME }}:${{ env.STAGING_TAG }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO_NAME }}:${{ github.sha }}
          format: table
          exit-code: '0'

      - name: Push images
        run: |
          docker push ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO_NAME }}:${{ github.sha }}
          docker push ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO_NAME }}:${{ env.STAGING_TAG }}

  deploy-staging:
    needs: build-and-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER

      - name: Set image in staging manifest
        run: |
          REPO=$(aws ecr describe-repositories --repository-names ${ECR_REPO_NAME} --query 'repositories[0].repositoryUri' --output text)
          sed -i "s|<ECR_REPO_URL>|$REPO|g" k8s/deployment-staging.yaml
          sed -i "s|<RDS_ENDPOINT_DNS>|${{ secrets.RDS_ENDPOINT }}|g" k8s/deployment-staging.yaml
          sed -i "s|<POPULATED_FROM_SECRETS_MANAGER>|${{ secrets.DB_PASSWORD }}|g" k8s/deployment-staging.yaml

      - name: Apply staging
        run: |
          kubectl apply -f k8s/deployment-staging.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Integration test (staging)
        run: |
          sleep 20
          HOST=$(kubectl get ingress webapp -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "Ingress: $HOST"
          curl -s -k https://$HOST/healthz || exit 1

  manual-approval:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://example.com
    steps:
      - name: Await manual approval
        run: echo "Approve this job in the UI to continue to prod."

  deploy-prod:
    needs: manual-approval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER

      - name: Set images & secrets in prod
        run: |
          REPO=$(aws ecr describe-repositories --repository-names ${ECR_REPO_NAME} --query 'repositories[0].repositoryUri' --output text)
          sed -i "s|<ECR_REPO_URL>|$REPO|g" k8s/deployment-prod.yaml
          sed -i "s|<RDS_ENDPOINT_DNS>|${{ secrets.RDS_ENDPOINT }}|g" k8s/deployment-prod.yaml
          sed -i "s|<POPULATED_FROM_SECRETS_MANAGER>|${{ secrets.DB_PASSWORD }}|g" k8s/deployment-prod.yaml

      - name: Build prod-canary image tag and push
        run: |
          docker pull ${{ steps.ecr.outputs.registry || format('{0}.dkr.ecr.{1}.amazonaws.com', secrets.AWS_ACCOUNT_ID, env.AWS_REGION) }}/${{ env.ECR_REPO_NAME }}:${{ env.STAGING_TAG }} || true
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $(aws sts get-caller-identity --query 'Account' --output text).dkr.ecr.$AWS_REGION.amazonaws.com
          docker tag $(aws ecr describe-repositories --repository-names ${ECR_REPO_NAME} --query 'repositories[0].repositoryUri' --output text):${{ env.STAGING_TAG }} \
                     $(aws ecr describe-repositories --repository-names ${ECR_REPO_NAME} --query 'repositories[0].repositoryUri' --output text):${{ env.PROD_TAG }}
          docker push $(aws ecr describe-repositories --repository-names ${ECR_REPO_NAME} --query 'repositories[0].repositoryUri' --output text):${{ env.PROD_TAG }}

      - name: Apply prod (stable+canary)
        run: |
          kubectl apply -f k8s/deployment-prod.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Smoke test (prod)
        run: |
          sleep 20
          HOST=$(kubectl get ingress webapp -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          curl -sSf -k https://$HOST/healthz
